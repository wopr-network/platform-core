name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]

jobs:
  build-lint-test:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npx @biomejs/biome format src/

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  e2e:
    runs-on: [self-hosted, Linux, X64]
    needs: build-lint-test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Start platform API via docker-compose
      # NOTE: requires wopr-network/wopr-platform:latest image to be available on the runner
      - name: Start platform API
        run: docker compose up -d platform-api
        env:
          COMPOSE_PROJECT_NAME: wopr-e2e-${{ github.run_id }}

      - name: Wait for platform API
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001 > /dev/null 2>&1; then
              echo "Platform API is ready"
              exit 0
            fi
            echo "Waiting for platform API... ($i/30)"
            sleep 2
          done
          echo "Platform API failed to start"
          docker compose logs platform-api
          exit 1
        env:
          COMPOSE_PROJECT_NAME: wopr-e2e-${{ github.run_id }}

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true
          NEXT_PUBLIC_API_URL: http://localhost:3001

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Stop platform API
        if: always()
        run: docker compose down -v
        env:
          COMPOSE_PROJECT_NAME: wopr-e2e-${{ github.run_id }}
