name: Promote to Production

on:
  workflow_dispatch:
    inputs:
      staging_ref:
        description: >
          Git ref (commit SHA or tag) currently deployed to staging.
          Leave empty to deploy the latest commit on main.
        required: false
        default: ""
      confirm:
        description: "Type 'promote' to confirm production deployment"
        required: true

jobs:
  validate:
    # Using ubuntu-latest because this org does not have self-hosted runners configured.
    runs-on: ubuntu-latest
    steps:
      - name: Require confirmation
        if: inputs.confirm != 'promote'
        run: |
          echo "::error::You must type 'promote' to confirm production deployment."
          exit 1

      - name: Validate staging deployment
        if: inputs.staging_ref != ''
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.SSH_DEPLOY_USER }}
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          script: |
            DEPLOYED_SHA=$(docker inspect ghcr.io/${{ github.repository }}:staging --format='{{index .Config.Labels "org.opencontainers.image.revision"}}' 2>/dev/null || echo "")
            if [ "$DEPLOYED_SHA" != "${{ inputs.staging_ref }}" ]; then
              echo "::error::staging_ref ${{ inputs.staging_ref }} is not currently deployed to staging (deployed: $DEPLOYED_SHA)"
              exit 1
            fi
            echo "Validated: ${{ inputs.staging_ref }} is deployed to staging"

  ci:
    # Using ubuntu-latest because this org does not have self-hosted runners configured.
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.staging_ref || 'main' }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Format check
        run: pnpm exec biome format src/

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test

  deploy:
    # Using ubuntu-latest because this org does not have self-hosted runners configured.
    runs-on: ubuntu-latest
    needs: ci
    environment: production
    permissions:
      packages: write
      contents: read
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote staging image to production
        run: |
          # Pull the staging image
          docker pull ghcr.io/${{ github.repository }}:staging

          # Retag it for production
          docker tag ghcr.io/${{ github.repository }}:staging ghcr.io/${{ github.repository }}:production
          docker tag ghcr.io/${{ github.repository }}:staging ghcr.io/${{ github.repository }}:${{ inputs.staging_ref || github.sha }}

          # Push production tags
          docker push ghcr.io/${{ github.repository }}:production
          docker push ghcr.io/${{ github.repository }}:${{ inputs.staging_ref || github.sha }}

      - name: Deploy to production VPS
        id: deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.SSH_DEPLOY_USER }}
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          script: |
            if [ ! -f /opt/wopr-platform-ui/docker-compose.yml ]; then
              echo "::error::docker-compose.yml not found at /opt/wopr-platform-ui/"
              exit 1
            fi
            cd /opt/wopr-platform-ui
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f

      - name: Verify deployment health
        id: health_check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.SSH_DEPLOY_USER }}
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          script: |
            for i in $(seq 1 15); do
              if curl -sf ${{ secrets.PRODUCTION_HEALTH_CHECK_URL }} > /dev/null 2>&1; then
                echo "Production is healthy"
                exit 0
              fi
              echo "Waiting for health check... ($i/15)"
              sleep 5
            done
            echo "Health check timed out"
            docker compose -f /opt/wopr-platform-ui/docker-compose.yml logs --tail=50
            exit 1

      - name: Rollback on failure
        if: failure() && steps.health_check.outcome == 'failure'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.SSH_DEPLOY_USER }}
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          script: |
            echo "Rolling back to previous version..."
            cd /opt/wopr-platform-ui
            docker compose down
            docker compose pull ghcr.io/${{ github.repository }}:production-previous || echo "No previous version found"
            docker tag ghcr.io/${{ github.repository }}:production-previous ghcr.io/${{ github.repository }}:production || true
            docker compose up -d --remove-orphans
